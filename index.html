<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ລະບົບຕິດຕາມການຜະລິດ — ໂຮງງານເສື້ອກີລາພິມລາຍ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #121212;
  --bg2:      #1E1E1E;
  --bg3:      #252525;
  --bg4:      #2D2D2D;
  --border:   #333333;
  --border2:  #444444;
  --red:      #E53935;
  --red-dark: #C62828;
  --red-glow: rgba(229, 57, 53, 0.15);
  --red-dim:  #3D1414;
  --red-lite: #FF8A80;
  --accent:   #42A5F5;
  --text:     #E0E0E0;
  --text2:    #B0B0B0;
  --text3:    #757575;
  --mono:     'IBM Plex Mono', monospace;
  --r:        8px;
  --rl:       12px;
  --shadow:   0 4px 12px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans Lao',sans-serif;
  background:var(--bg);color:var(--text);
  font-size:14px;line-height:1.6;min-height:100vh;
}

/* HEADER */
.hdr{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 2rem;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
  box-shadow: var(--shadow);
}
.hdr-l{display:flex;align-items:center;gap:16px}
.logo{
  width:40px;height:40px;border-radius:var(--r);
  background: linear-gradient(135deg, var(--red), var(--red-dark));
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;color:#fff;flex-shrink:0;
  box-shadow: 0 2px 8px rgba(229, 57, 53, 0.4);
}
.hdr-title{font-size:16px;font-weight:700; letter-spacing: 0.5px;}
.hdr-sub{font-size:11px;color:var(--text3);margin-top:2px; font-weight: 500;}
.hdr-date{
  font-family:var(--mono);font-size:12px;color:var(--text2);
  background:var(--bg3);border:1px solid var(--border);
  padding:6px 14px;border-radius:var(--r);
}

/* MAIN */
.main{padding:2rem;max-width:1440px;margin:0 auto}

/* STATS */
.sg{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:16px;margin-bottom:2rem}
.sc{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--rl);padding:18px 20px;position:relative;overflow:hidden;
  transition: transform 0.2s, border-color 0.2s;
}
.sc:hover { transform: translateY(-2px); border-color: var(--border2); }
.sc.danger{border-color: var(--red-dark); background: linear-gradient(to bottom right, var(--red-dim), var(--bg2));}
.sl{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.sv{font-size:28px;font-weight:800;letter-spacing:-0.02em;line-height:1}
.su{font-size:14px;font-weight:500;color:var(--text3);margin-left:4px}
.sh{font-size:11px;color:var(--text3);margin-top:6px; font-family: var(--mono);}

/* STAGE BAR */
.sb-container {
    margin-bottom: 1.5rem;
    background:var(--bg2);border:1px solid var(--border);
    border-radius:var(--rl);
    padding: 12px;
}
.sb-title {
    font-size: 11px; font-weight: 700; color: var(--text3); 
    margin-bottom: 10px; padding-left: 8px; text-transform: uppercase; letter-spacing: 1px;
}
.sb{
  display:flex;align-items:center;overflow-x:auto; gap: 4px;
  padding-bottom: 4px;
}
.sb::-webkit-scrollbar { height: 4px; }
.sb::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

.sp{
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:var(--text2);white-space:nowrap;cursor:pointer;
  padding:8px 12px;border-radius:var(--r);transition:all .2s;
  background: var(--bg3); border: 1px solid transparent;
}
.sp:hover{background:var(--bg4); border-color: var(--border2);}
.sp.on{background: var(--red-dim); color:var(--red-lite); border-color: var(--red-dark); font-weight:700}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0}
.sp.on .sdot{background:var(--red); box-shadow: 0 0 8px var(--red);}
.sct{
  font-family:var(--mono);font-size:10px;
  background:rgba(255,255,255,0.05);color:var(--text3);
  padding:2px 6px;border-radius:4px; margin-left: 4px;
}
.sp.on .sct{background:rgba(255,255,255,0.1);color:var(--red-lite)}
.s-all{
  margin-left:auto;font-size:12px;font-weight: 600; color:var(--text2);
  cursor:pointer;padding:8px 16px;border-radius:var(--r);
  background: var(--bg3); border: 1px solid var(--border);
}
.s-all:hover{background:var(--bg4); border-color: var(--accent); color: var(--accent);}

/* TOOLBAR */
.tb{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.tbl{display:flex;align-items:center;gap:12px;flex:1;flex-wrap:wrap}
select,input[type=text],input[type=search],input[type=number],input[type=date]{
  height:40px;padding:0 14px;
  border:1px solid var(--border);border-radius:var(--r);
  background:var(--bg3);color:var(--text);
  font-family:'Noto Sans Lao',sans-serif;font-size:14px;outline:none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
select:focus,input:focus{border-color:var(--accent); box-shadow: 0 0 0 2px rgba(66, 165, 245, 0.2);}
.si{width:240px}
.btn{
  height:40px;padding:0 18px;border-radius:var(--r);
  border:1px solid var(--border);background:var(--bg3);color:var(--text2);
  font-family:'Noto Sans Lao',sans-serif;font-size:14px;
  cursor:pointer;font-weight:600;white-space:nowrap;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;
}
.btn:hover{background:var(--bg4);color:var(--text); border-color: var(--border2);}
.bp{background:var(--red);color:#fff;border-color:var(--red); box-shadow: 0 2px 6px rgba(229, 57, 53, 0.3);}
.bp:hover{background:var(--red-dark);border-color:var(--red-dark); transform: translateY(-1px);}
.bx{background:rgba(77, 191, 138, 0.1);color:#4DBF8A;border-color:rgba(77, 191, 138, 0.3)}
.bx:hover{background:rgba(77, 191, 138, 0.2); border-color:#4DBF8A}
.bi{background:rgba(66, 165, 245, 0.1);color:#42A5F5;border-color:rgba(66, 165, 245, 0.3)}
.bi:hover{background:rgba(66, 165, 245, 0.2); border-color:#42A5F5}

/* TABLE */
.tw{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden; box-shadow: var(--shadow);}
.ts{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{
  font-size:11px;font-weight:700;color:var(--text3);
  letter-spacing:.1em;text-transform:uppercase;
  padding:14px 16px;text-align:left;
  background:var(--bg3);border-bottom:1px solid var(--border);white-space:nowrap;
}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,0.02)}
tbody td{padding:14px 16px;vertical-align:middle}
.in{font-weight:700;font-size:14px;line-height:1.4; color: var(--text);}
.ino{font-size:12px;color:var(--text3);margin-top:4px; font-weight: 500;}
.ifabric{display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--accent); background: rgba(66, 165, 245, 0.1); padding: 2px 6px; border-radius: 4px; margin-top: 4px;}
.ic{font-family:var(--mono);font-size:12px;color:var(--text2); font-weight: 500;}
.qt{font-weight:700;font-size:15px;text-align:right;font-family:var(--mono); color: var(--text);}

/* badge */
.badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap; border: 1px solid transparent;}
.b-step { background: var(--bg3); color: var(--text2); border-color: var(--border); }
.b-done { background: rgba(77, 191, 138, 0.1); color: #4DBF8A; border-color: rgba(77, 191, 138, 0.3); }
.b-active { background: var(--red-dim); color: var(--red-lite); border-color: var(--red-dark); }

/* progress */
.pw{display:flex;align-items:center;gap:10px}
.pb{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;min-width:80px}
.pf{height:100%;border-radius:3px; transition: width 0.4s ease;}
.pp{font-size:11px;color:var(--text2);min-width:36px;text-align:right;font-family:var(--mono); font-weight: 600;}

/* defect */
.dok{color:#4DBF8A;font-weight:700}
.dwn{color:#FFB74D;font-weight:700}
.dbd{color:var(--red-lite);font-weight:700}
.ds{font-size:11px;color:var(--text3); font-family: var(--mono);}

/* days */
.dc{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.dd{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:var(--mono)}
.dok2{background:rgba(77, 191, 138, 0.15);color:#4DBF8A}
.dwn2{background:rgba(255, 183, 77, 0.15);color:#FFB74D}
.dbd2{background:rgba(229, 57, 53, 0.15);color:var(--red-lite)}

/* actions */
.act-cell { display: flex; gap: 6px; }
.ab{border:1px solid var(--border);background:var(--bg3);cursor:pointer;color:var(--text2);font-size:14px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--r);transition:all .2s}
.ab:hover{background:var(--bg4);color:var(--text); border-color: var(--border2); transform: scale(1.1);}
.ab-next { color: var(--accent); border-color: rgba(66, 165, 245, 0.3); }
.ab-next:hover { background: rgba(66, 165, 245, 0.1); border-color: var(--accent); }
.ab-del:hover { color: var(--red); border-color: var(--red); background: var(--red-dim); }

.ec{text-align:center;padding:4rem;color:var(--text3);font-size:14px; font-weight: 500;}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter: blur(4px);display:flex;align-items:center;justify-content:center;z-index:200}
.md{
  background:var(--bg2);border-radius:var(--rl);border:1px solid var(--border);
  padding:0;width:min(1200px,98vw);max-height:96vh;overflow:hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,0.6);
  display:flex;flex-direction:column;
}
.md-body{
  display:grid;grid-template-columns:1fr 420px;
  overflow:hidden;flex:1;min-height:0;
}
.md-form-panel{
  padding:1.5rem;overflow-y:auto;border-right:1px solid var(--border);
}
.md-preview-panel{
  background:#f0f0f0;overflow-y:auto;display:flex;flex-direction:column;
  align-items:center;padding:16px;gap:12px;
}
.md-header{
  padding:1rem 1.5rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  background:var(--bg2);
}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.mt{font-size:18px;font-weight:800; color: var(--text);}
.xb{border:none;background:none;cursor:pointer;color:var(--text3);font-size:24px;line-height:1;padding:4px;border-radius:5px; transition: color 0.2s;}
.xb:hover{color:var(--red)}
.fg{margin-bottom:16px}
.fl{display:block;font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.05em;margin-bottom:8px;text-transform:uppercase}
.fi{
  width:100%;height:42px;padding:0 14px;
  border:1px solid var(--border);border-radius:var(--r);
  background:var(--bg3);color:var(--text);
  font-family:'Noto Sans Lao',sans-serif;font-size:14px;outline:none;transition:all .2s;
}
.fi:focus{border-color:var(--accent); background: var(--bg4);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.form-section-label{
  font-size:11px;font-weight:700;color:var(--accent);
  letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:12px;padding:6px 10px;
  background:rgba(66,165,245,0.07);border-radius:6px;
  border-left:3px solid var(--accent);
}
.mf{display:flex;justify-content:flex-end;gap:12px;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border)}

/* TOAST */
.toast{
  position:fixed;bottom:2rem;right:2rem;
  background:var(--bg3);color:var(--text);
  border:1px solid var(--accent);
  padding:12px 24px;border-radius:var(--r);
  font-size:14px;font-weight: 600; z-index:999;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  opacity:0;transform:translateY(10px);transition:all .3s cubic-bezier(0.18, 0.89, 0.32, 1.28);pointer-events:none;
}
.toast.show{opacity:1;transform:translateY(0)}

.ot{font-size:11px;color:var(--red-lite);font-weight:700;margin-top:6px;letter-spacing:.03em; display: flex; align-items: center; gap: 4px;}
.fn-info{margin-top:16px;font-size:12px;color:var(--text3);text-align:right;font-family:var(--mono); font-weight: 500;}

/* DEFECT DETAIL MODAL */
.defect-modal-content {
  max-height: 70vh;
  overflow-y: auto;
}
.defect-item {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.2s;
}
.defect-item:hover {
  background: var(--bg4);
  border-color: var(--border2);
}
.defect-stage-name {
  font-weight: 700;
  color: var(--text);
  font-size: 13px;
  flex: 1;
}
.defect-stage-count {
  display: flex;
  align-items: center;
  gap: 12px;
}
.defect-badge {
  background: var(--red-dim);
  color: var(--red-lite);
  padding: 4px 12px;
  border-radius: 6px;
  font-weight: 700;
  font-size: 13px;
  font-family: var(--mono);
  border: 1px solid var(--red-dark);
}
.defect-percent {
  color: var(--text2);
  font-size: 12px;
  font-family: var(--mono);
  min-width: 50px;
  text-align: right;
}

.gs-search-box {
  background: var(--bg3); border: 1px solid rgba(66,165,245,0.35);
  border-radius: var(--r); padding: 14px; margin-bottom: 16px;
}
.gs-search-hdr {
  font-size: 11px; font-weight: 700; color: var(--accent);
  letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px;
}
.gs-search-row {
  display: flex; gap: 8px; align-items: center; margin-bottom: 10px;
}
.col-hint { color: var(--text3); font-weight: 400; font-size: 10px; }
.gs-filled-ok {
  font-size: 12px; color: #4DBF8A; padding: 8px 12px;
  background: rgba(77,191,138,0.1); border-radius: 6px;
  border: 1px solid rgba(77,191,138,0.3); margin-top: 8px;
}

/* GOOGLE SHEET IMPORT */
.gs-btn {
  width: 100%; height: 42px; border-radius: var(--r);
  border: 1px dashed rgba(66,165,245,0.5);
  background: rgba(66,165,245,0.06);
  color: var(--accent); font-size: 13px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  gap: 8px; transition: all .2s; margin-bottom: 16px;
  font-family: 'Noto Sans Lao', sans-serif;
}
.gs-btn:hover { background: rgba(66,165,245,0.14); border-color: var(--accent); }
.gs-btn:disabled { opacity: 0.5; cursor: wait; }
.gs-picker {
  background: var(--bg3); border: 1px solid var(--accent);
  border-radius: var(--r); margin-bottom: 16px; overflow: hidden;
  box-shadow: 0 4px 12px rgba(66,165,245,0.15);
}
.gs-picker-hdr {
  padding: 10px 14px; background: rgba(66,165,245,0.1);
  font-size: 11px; font-weight: 700; color: var(--accent);
  letter-spacing: .08em; text-transform: uppercase;
  border-bottom: 1px solid rgba(66,165,245,0.2);
  display: flex; align-items: center; justify-content: space-between;
}
.gs-row {
  padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
  display: grid; grid-template-columns: 1fr auto auto;
  gap: 12px; align-items: center; transition: background .15s;
  font-size: 13px;
}
.gs-row:last-child { border-bottom: none; }
.gs-row:hover { background: rgba(66,165,245,0.08); }
.gs-row-code { font-family: var(--mono); font-size: 11px; color: var(--accent); font-weight: 700; }
.gs-row-qty { font-family: var(--mono); font-size: 11px; color: var(--text3); }
.gs-err { padding: 12px 14px; color: var(--red-lite); font-size: 12px; text-align: center; }
.gs-loading { padding: 16px; text-align: center; color: var(--text3); font-size: 13px; }
.gs-tag { font-size: 10px; background: rgba(66,165,245,0.15); color: var(--accent); padding: 2px 6px; border-radius: 4px; }

/* ========== SCAN BUTTON ========== */
.btn-scan {
  display: flex; align-items: center; gap: 8px;
  height: 40px; padding: 0 16px; border-radius: var(--r);
  background: linear-gradient(135deg, var(--red), var(--red-dark));
  border: none; color: #fff; font-family: 'Noto Sans Lao', sans-serif;
  font-size: 13px; font-weight: 700; cursor: pointer;
  box-shadow: 0 2px 8px rgba(229,57,53,0.4);
  transition: all .2s; white-space: nowrap;
}
.btn-scan:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(229,57,53,0.5); }
.btn-scan:active { transform: translateY(0); }
@media(max-width:500px){ .btn-scan-label { display:none; } }

/* ========== SCANNER OVERLAY ========== */
.scan-ov {
  position: fixed; inset: 0; background: rgba(0,0,0,0.92);
  z-index: 500; display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(6px);
}
.scan-modal {
  width: min(420px, 96vw); border-radius: 16px; overflow: hidden;
  background: #111; box-shadow: 0 24px 60px rgba(0,0,0,0.8);
}
.scan-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; background: var(--red);
}
.scan-close {
  background: rgba(255,255,255,0.15); border: none; border-radius: 50%;
  width: 32px; height: 32px; font-size: 20px; color: #fff;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .2s; line-height: 1;
}
.scan-close:hover { background: rgba(255,255,255,0.3); }

/* camera viewport */
.scan-viewport {
  position: relative; width: 100%; aspect-ratio: 1;
  background: #000; overflow: hidden;
}
#scan-video {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
/* aim box */
.scan-aim {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
}
.scan-corner {
  position: absolute; width: 32px; height: 32px;
  border-color: #fff; border-style: solid; border-width: 0;
}
.scan-corner.tl { top: 20%; left: 15%; border-top-width: 3px; border-left-width: 3px; border-radius: 3px 0 0 0; }
.scan-corner.tr { top: 20%; right: 15%; border-top-width: 3px; border-right-width: 3px; border-radius: 0 3px 0 0; }
.scan-corner.bl { bottom: 20%; left: 15%; border-bottom-width: 3px; border-left-width: 3px; border-radius: 0 0 0 3px; }
.scan-corner.br { bottom: 20%; right: 15%; border-bottom-width: 3px; border-right-width: 3px; border-radius: 0 0 3px 0; }
/* scanning line animation */
.scan-line {
  position: absolute; left: 16%; right: 16%;
  height: 2px; background: linear-gradient(90deg, transparent, var(--red), transparent);
  animation: scanMove 2s ease-in-out infinite;
  box-shadow: 0 0 8px rgba(229,57,53,0.8);
}
@keyframes scanMove {
  0%   { top: 22%; }
  50%  { top: 76%; }
  100% { top: 22%; }
}
.scan-hint {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.6); color: #fff; font-size: 12px;
  padding: 5px 14px; border-radius: 20px; white-space: nowrap;
  font-family: 'Noto Sans Lao', sans-serif;
}
.scan-hint.found { background: rgba(77,191,138,0.8); }
.scan-hint.error { background: rgba(229,57,53,0.8); }

/* manual input */
.scan-manual {
  padding: 14px 16px 16px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.scan-input {
  flex: 1; height: 40px; padding: 0 12px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: var(--r); color: #fff; font-size: 14px; outline: none;
  font-family: 'Noto Sans Lao', sans-serif; width: 100%;
}
.scan-input:focus { border-color: var(--accent); }
.scan-input::placeholder { color: rgba(255,255,255,0.3); }

/* ========== SCAN RESULT MODAL ========== */
.scan-result-modal {
  width: min(400px, 96vw); background: var(--bg2);
  border-radius: 14px; overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: 0 20px 50px rgba(0,0,0,0.7);
}
.scan-result-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; background: rgba(77,191,138,0.15);
  border-bottom: 1px solid rgba(77,191,138,0.3);
  font-weight: 700; color: #4DBF8A; font-size: 14px;
}
.scan-result-hdr .scan-close { background: rgba(255,255,255,0.1); }
.scan-result-info {
  padding: 16px 18px; border-bottom: 1px solid var(--border);
}
.scan-info-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 13px; }
.scan-info-label { color: var(--text3); font-weight: 700; min-width: 80px; }
.scan-info-val { color: var(--text); font-weight: 500; }
.scan-result-stages {
  padding: 12px 18px; max-height: 280px; overflow-y: auto;
}
.scan-stage-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: var(--r); cursor: pointer;
  border: 1.5px solid var(--border); margin-bottom: 6px;
  transition: all .15s; background: var(--bg3);
}
.scan-stage-item:hover { border-color: var(--accent); background: rgba(66,165,245,0.08); }
.scan-stage-item.selected { border-color: var(--accent); background: rgba(66,165,245,0.15); }
.scan-stage-item.current { border-color: var(--red); background: var(--red-dim); }
.scan-stage-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.scan-stage-name { font-size: 13px; font-weight: 500; flex: 1; }
.scan-stage-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; }
.scan-result-footer {
  display: flex; gap: 10px; justify-content: flex-end;
  padding: 14px 18px; border-top: 1px solid var(--border);
}

.hidden{display:none!important}

/* A4 PREVIEW */
.a4-sheet {
  width: 210mm; min-height: 297mm;
  background: #fff; color: #111;
  padding: 14mm 14mm 10mm 14mm;
  box-shadow: 0 4px 24px rgba(0,0,0,0.25);
  font-family: 'Noto Sans Lao', 'IBM Plex Mono', sans-serif;
  font-size: 12px; line-height: 1.5;
  position: relative; border-radius: 2px;
  transform-origin: top center;
  transform: scale(0.62);
  margin-top: -60mm;
  flex-shrink: 0;
}
/* --- header --- */
.a4-hdr { display:flex; justify-content:space-between; align-items:flex-start; border-bottom: 2.5px solid #111; padding-bottom: 8px; margin-bottom: 10px; }
.a4-logo-box { display:flex; align-items:center; gap:10px; }
.a4-logo { width:48px;height:48px;border-radius:6px;background:#E53935;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff; }
.a4-company { font-size:13px;font-weight:800;color:#111; }
.a4-company-sub { font-size:10px;color:#555;margin-top:2px; }
.a4-doc-title { text-align:right; }
.a4-doc-title h2 { font-size:20px;font-weight:900;color:#E53935;margin:0;letter-spacing:1px; }
.a4-doc-title .a4-inv { font-size:14px;font-weight:700;color:#111;margin-top:2px; font-family:'IBM Plex Mono',monospace; }
/* --- meta grid --- */
.a4-meta { display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;margin-bottom:10px;padding:8px 10px;background:#f8f8f8;border:1px solid #ddd;border-radius:4px; }
.a4-meta-row { display:flex;gap:6px;font-size:11px; }
.a4-meta-label { color:#555;font-weight:700;min-width:90px;flex-shrink:0; }
.a4-meta-val { color:#111;font-weight:500; }
/* --- image area --- */
.a4-img-section { margin-bottom:10px; }
.a4-img-label { font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px; }
.a4-img-row { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
.a4-img-box {
  border: 1.5px dashed #bbb; border-radius:4px;
  height: 140px; display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#fafafa; color:#aaa;font-size:11px;text-align:center;overflow:hidden;position:relative;
}
.a4-img-box img { width:100%;height:100%;object-fit:contain; }
.a4-img-box .a4-img-placeholder { display:flex;flex-direction:column;align-items:center;gap:4px; }
/* --- stage table --- */
.a4-table { width:100%;border-collapse:collapse;margin-bottom:10px;font-size:11px; }
.a4-table th { background:#111;color:#fff;padding:5px 8px;text-align:left;font-weight:700;font-size:10px;letter-spacing:.05em; }
.a4-table td { padding:5px 8px;border-bottom:1px solid #eee; }
.a4-table tr:nth-child(even) td { background:#f9f9f9; }
.a4-stage-dot { display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;flex-shrink:0; }
/* --- sign area --- */
.a4-sign { display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:12px;border-top:1.5px solid #ddd;padding-top:10px; }
.a4-sign-box { text-align:center; }
.a4-sign-line { border-bottom:1px solid #333;height:36px;margin-bottom:4px; }
.a4-sign-label { font-size:10px;color:#555;font-weight:700; }
/* --- footer --- */
.a4-footer { margin-top:auto;padding-top:8px;border-top:1px solid #eee;font-size:9px;color:#aaa;text-align:center; }
/* --- qr placeholder --- */
.a4-qr { width:50px;height:50px;background:#f0f0f0;border:1px solid #ddd;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;color:#aaa;text-align:center; }

/* UPLOAD ZONE */
.upload-zone {
  border: 1.5px dashed var(--border2); border-radius: var(--r);
  padding: 12px; text-align:center; cursor:pointer;
  background: var(--bg3); color: var(--text3); font-size:12px;
  transition: all .2s; margin-bottom:8px;
}
.upload-zone:hover { border-color: var(--accent); color: var(--accent); background: rgba(66,165,245,0.05); }
.upload-zone input { display:none; }
.img-thumbs { display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px; }
.img-thumb { position:relative;width:72px;height:72px; }
.img-thumb img { width:100%;height:100%;object-fit:cover;border-radius:5px;border:1px solid var(--border); }
.img-thumb .rm-btn { position:absolute;top:-5px;right:-5px;width:18px;height:18px;background:#E53935;border:none;border-radius:50%;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1; }

/* A4 PLAYER TABLE */
.a4-player-table {
  width:100%; border-collapse:collapse; font-size:11px;
}
.a4-player-table th {
  background:#222; color:#fff; padding:5px 7px;
  text-align:left; font-size:10px; font-weight:700; letter-spacing:.04em;
}
.a4-player-table td {
  padding:5px 7px; border-bottom:1px solid #e8e8e8; vertical-align:middle;
}
.a4-player-table tbody tr:nth-child(even) td { background:#f7f7f7; }
.a4-player-table tbody tr:last-child td { border-bottom: 2px solid #111; }

/* DETAIL IMAGE ZONE (screenshot upload) */
.detail-img-zone {
  border: 2px dashed var(--border2); border-radius: var(--r);
  min-height: 120px; padding: 12px; margin-bottom: 12px;
  cursor: pointer; transition: all .2s; position: relative;
  background: var(--bg3);
}
.detail-img-zone:hover, .detail-img-zone.drag-over {
  border-color: var(--accent); background: rgba(66,165,245,0.05);
}
.detail-img-zone.drag-over { border-style: solid; }
.detail-img-hint { text-align:center; padding: 12px; color: var(--text2); }
.detail-img-preview {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px;
}
.detail-img-thumb {
  position: relative; border-radius: 6px; overflow: hidden;
  border: 1px solid var(--border);
  flex: 1 1 auto; min-width: 120px; max-width: 100%;
}
.detail-img-thumb img {
  width: 100%; display: block; cursor: pointer;
  transition: opacity .2s;
}
.detail-img-thumb img:hover { opacity: 0.85; }
.detail-img-thumb .rm-detail {
  position: absolute; top: 4px; right: 4px;
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(0,0,0,0.7); border: none;
  color: #fff; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.detail-img-thumb .rm-detail:hover { background: var(--red); }

/* A4 detail image section */
.a4-detail-imgs { display: flex; flex-direction: column; gap: 8px; margin-bottom:10px; }
.a4-detail-img-wrap { border: 1px solid #ddd; border-radius: 3px; overflow: hidden; }
.a4-detail-img-wrap img { width: 100%; display: block; }
.a4-detail-placeholder {
  border: 1.5px dashed #ccc; border-radius: 4px; height: 80px;
  display: flex; align-items: center; justify-content: center;
  color: #bbb; font-size: 11px; text-align: center;
}

/* PLAYER INPUT GRID in form */
.player-grid-wrap {
  border: 1px solid var(--border); border-radius: var(--r);
  overflow: hidden; margin-bottom: 8px;
}
.player-grid-hdr {
  display: grid;
  grid-template-columns: 28px 1fr 70px 80px 55px 1fr 32px;
  gap: 0;
  background: var(--bg4); border-bottom: 1px solid var(--border);
  font-size: 10px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: .05em;
}
.player-grid-hdr span { padding: 6px 8px; }
.player-row {
  display: grid;
  grid-template-columns: 28px 1fr 70px 80px 55px 1fr 32px;
  gap: 0;
  border-bottom: 1px solid var(--border);
  align-items: center;
}
.player-row:last-child { border-bottom: none; }
.player-row input, .player-row select {
  height: 34px; border: none; border-right: 1px solid var(--border);
  background: var(--bg3); color: var(--text);
  font-family: 'Noto Sans Lao', sans-serif; font-size: 12px;
  padding: 0 6px; width: 100%; outline: none; border-radius: 0;
}
.player-row input:focus, .player-row select:focus {
  background: var(--bg4); border-color: var(--border);
  box-shadow: inset 0 0 0 2px rgba(66,165,245,0.3);
}
.player-row .p-num { text-align: center; color: var(--text3); font-size: 11px; font-family: var(--mono); padding: 0 4px; }
.player-row .rm-player {
  width:32px; height:34px; border:none; background:transparent;
  color:var(--text3); cursor:pointer; font-size:14px;
  display:flex; align-items:center; justify-content:center;
  transition: color .15s;
}
.player-row .rm-player:hover { color: var(--red); }
.player-add-btn {
  width:100%; height:34px; border:none; border-top:1px solid var(--border);
  background:rgba(66,165,245,0.05); color:var(--accent);
  font-size:12px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition: background .15s;
}
.player-add-btn:hover { background:rgba(66,165,245,0.12); }

/* ===== LOGIN GATE ===== */
#login-gate {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
}
.login-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--rl); padding: 36px 32px;
  width: min(420px, 96vw);
  box-shadow: 0 24px 64px rgba(0,0,0,0.7);
  display: flex; flex-direction: column; align-items: center;
}
.login-logo {
  width: 56px; height: 56px; border-radius: 14px;
  background: linear-gradient(135deg, var(--red), var(--red-dark));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 800; color: #fff;
  box-shadow: 0 4px 16px rgba(229,57,53,0.4);
  margin-bottom: 16px;
}
.login-title { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
.login-sub { font-size: 12px; color: var(--text3); margin-bottom: 28px; text-align: center; }
.login-field { width: 100%; margin-bottom: 14px; }
.login-label { display: block; font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: .07em; text-transform: uppercase; margin-bottom: 6px; }
.login-input {
  width: 100%; height: 46px; padding: 0 16px;
  border: 1px solid var(--border2); border-radius: var(--r);
  background: var(--bg3); color: var(--text);
  font-family: 'Noto Sans Lao', sans-serif; font-size: 15px;
  outline: none; transition: border-color .2s;
}
.login-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(66,165,245,.2); }
.login-pin { letter-spacing: 6px; font-size: 18px; text-align: center; }
.login-err { color: var(--red-lite); font-size: 12px; font-weight: 600; min-height: 20px; margin-bottom: 8px; text-align: center; }
.login-btn {
  width: 100%; height: 48px; border-radius: var(--r);
  background: var(--red); border: none; color: #fff;
  font-family: 'Noto Sans Lao', sans-serif; font-size: 16px; font-weight: 700;
  cursor: pointer; transition: all .2s;
  box-shadow: 0 4px 14px rgba(229,57,53,0.35);
}
.login-btn:hover { background: var(--red-dark); transform: translateY(-1px); }
.login-btn:active { transform: translateY(0); }
.login-divider { width: 100%; border: none; border-top: 1px solid var(--border); margin: 20px 0; }
.login-admin-link { font-size: 11px; color: var(--text3); cursor: pointer; transition: color .2s; }
.login-admin-link:hover { color: var(--accent); }
.login-spinner { font-size: 13px; color: var(--text3); margin-top: 10px; }

/* ===== QR SCANNER ===== */
.btn-scan {
  height: 40px; padding: 0 16px;
  background: linear-gradient(135deg, #E53935, #C62828);
  border: none; border-radius: var(--r);
  color: #fff; font-weight: 700; font-size: 13px;
  cursor: pointer; display: flex; align-items: center; gap: 8px;
  box-shadow: 0 2px 8px rgba(229,57,53,0.4);
  transition: all .2s; white-space: nowrap;
  font-family: 'Noto Sans Lao', sans-serif;
}
.btn-scan:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(229,57,53,0.5); }
.btn-scan:active { transform: translateY(0); }
@media(max-width:500px){ .btn-scan-label { display:none; } }

.scanner-modal {
  background: var(--bg2); border-radius: var(--rl);
  border: 1px solid var(--border);
  width: min(420px, 96vw);
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  overflow: hidden;
}
.scanner-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  background: var(--bg3);
}
.scanner-body { padding: 16px; }

/* Camera wrap */
.scanner-cam-wrap {
  position: relative; border-radius: var(--r); overflow: hidden;
  background: #000; aspect-ratio: 1/1; max-height: 70vw;
}
#scanner-video {
  width: 100%; height: 100%; object-fit: cover; display: block;
}

/* Scan frame corners */
.scan-frame {
  position: absolute; inset: 0;
  display: flex; pointer-events: none;
}
.scan-corner {
  position: absolute; width: 28px; height: 28px;
  border-color: #fff; border-style: solid; border-radius: 3px;
}
.scan-corner.tl { top:16px; left:16px; border-width:3px 0 0 3px; }
.scan-corner.tr { top:16px; right:16px; border-width:3px 3px 0 0; }
.scan-corner.bl { bottom:16px; left:16px; border-width:0 0 3px 3px; }
.scan-corner.br { bottom:16px; right:16px; border-width:0 3px 3px 0; }

/* Scan line animation */
.scan-line {
  position: absolute; left: 16px; right: 16px; height: 2px;
  background: linear-gradient(90deg, transparent, #E53935, #FF8A80, #E53935, transparent);
  border-radius: 2px; box-shadow: 0 0 8px rgba(229,57,53,0.8);
  animation: scanMove 2s ease-in-out infinite;
  top: 16px;
}
@keyframes scanMove {
  0%   { top: 16px; opacity:1; }
  48%  { top: calc(100% - 18px); opacity:1; }
  50%  { opacity:0.3; }
  52%  { top: 16px; opacity:1; }
  100% { top: 16px; opacity:1; }
}

.scan-hint {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.65); color: #fff; font-size: 12px; font-weight: 600;
  padding: 5px 14px; border-radius: 20px; white-space: nowrap;
  font-family: 'Noto Sans Lao', sans-serif;
}

/* Result panels */
.scanner-result, .scanner-notfound {
  padding: 16px 18px 18px; border-top: 1px solid var(--border);
}
.scanner-notfound { text-align: center; padding: 24px; }
.sr-found {
  display: flex; align-items: center; gap: 12px;
  background: rgba(77,191,138,0.1); border: 1px solid rgba(77,191,138,0.3);
  border-radius: var(--r); padding: 10px 14px; margin-bottom: 14px;
}
.sr-icon { font-size: 24px; }

/* ===== CHAT & ONLINE PANEL ===== */
#chat-fab {
  position: fixed; bottom: 24px; right: 24px; z-index: 400;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--accent); border: none; cursor: pointer;
  display: none; align-items: center; justify-content: center;
  font-size: 22px; box-shadow: 0 4px 16px rgba(66,165,245,0.5);
  transition: all .2s;
}
#chat-fab:hover { transform: scale(1.08); }
#chat-fab .chat-badge {
  position: absolute; top: -2px; right: -2px;
  background: var(--red); color: #fff;
  font-size: 10px; font-weight: 800; min-width: 18px; height: 18px;
  border-radius: 9px; display: none; align-items: center; justify-content: center;
  padding: 0 4px; border: 2px solid var(--bg);
}
#chat-panel {
  position: fixed; bottom: 86px; right: 24px; z-index: 400;
  width: min(380px, calc(100vw - 32px));
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--rl); box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  display: none; flex-direction: column; overflow: hidden;
  max-height: min(580px, calc(100vh - 120px));
}
#chat-panel.open { display: flex; }
.cp-tabs {
  display: flex; border-bottom: 1px solid var(--border);
  background: var(--bg3);
}
.cp-tab {
  flex: 1; padding: 10px; text-align: center; font-size: 12px;
  font-weight: 700; color: var(--text3); cursor: pointer;
  border: none; background: none; transition: all .15s;
  font-family: 'Noto Sans Lao', sans-serif;
}
.cp-tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); background: var(--bg2); }
.cp-tab:hover:not(.active) { color: var(--text); background: var(--bg2); }
.cp-pane { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.cp-pane.active { display: flex; }

/* Online pane */
.online-list { overflow-y: auto; flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
.online-row {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  border-radius: var(--r); background: var(--bg3); border: 1px solid var(--border);
}
.online-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.online-dot.on  { background: #4DBF8A; box-shadow: 0 0 6px rgba(77,191,138,0.7); }
.online-dot.off { background: var(--text3); }
.online-name { flex: 1; font-size: 13px; font-weight: 700; color: var(--text); }
.online-meta { font-size: 11px; color: var(--text3); }

/* Chat pane */
.chat-msgs {
  flex: 1; overflow-y: auto; padding: 12px; display: flex;
  flex-direction: column; gap: 8px;
}
.chat-msg { display: flex; gap: 8px; align-items: flex-end; }
.chat-msg.me { flex-direction: row-reverse; }
.chat-bubble {
  max-width: 72%; padding: 8px 12px; border-radius: 14px;
  font-size: 13px; line-height: 1.45; word-break: break-word;
}
.chat-msg.me   .chat-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.chat-msg.them .chat-bubble { background: var(--bg3); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.chat-sender { font-size: 10px; font-weight: 700; color: var(--text3); margin-bottom: 3px; }
.chat-time   { font-size: 10px; color: var(--text3); flex-shrink: 0; padding-bottom: 2px; }
.chat-input-row {
  display: flex; gap: 8px; padding: 10px; border-top: 1px solid var(--border);
  background: var(--bg3);
}
.chat-input {
  flex: 1; padding: 8px 12px; border: 1px solid var(--border2);
  border-radius: 20px; background: var(--bg); color: var(--text);
  font-family: 'Noto Sans Lao', sans-serif; font-size: 13px; outline: none;
  transition: border-color .2s;
}
.chat-input:focus { border-color: var(--accent); }
.chat-send-btn {
  width: 38px; height: 38px; border-radius: 50%; background: var(--accent);
  border: none; color: #fff; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.chat-send-btn:hover { background: #1E88E5; transform: scale(1.08); }
.chat-empty { text-align: center; color: var(--text3); font-size: 12px; padding: 24px; }
@media(max-width:500px){
  #chat-panel { right: 12px; bottom: 80px; width: calc(100vw - 24px); }
  #chat-fab   { bottom: 16px; right: 16px; }
}

// ---- Firestore helpers ----
function docToItem(doc) {
  return { id: doc.id, ...doc.data() };
}

function startRealtimeListener() {
  if (_unsubscribe) _unsubscribe();
  setSyncStatus(false, 'ກຳລັງເຊື່ອມຕໍ່...');
  _unsubscribe = db.collection(COLLECTION)
    .onSnapshot(snapshot => {
      // Sort client-side by createdAt ascending (no index needed)
      items = snapshot.docs
        .map(docToItem)
        .sort((a, b) => {
          const ta = a.createdAt && a.createdAt.toMillis ? a.createdAt.toMillis() : 0;
          const tb = b.createdAt && b.createdAt.toMillis ? b.createdAt.toMillis() : 0;
          return ta - tb;
        });
      setSyncStatus(true);
      render();
    }, err => {
      console.error('Firestore error:', err);
      setSyncStatus(false, err.code || 'error');
      // Show helpful message
      if (err.code === 'permission-denied') {
        document.getElementById('sync-status').textContent = '🔴 ຕັ້ງ Firestore Rules ກ່ອນ';
      }
    });
}

function getDefectByStage() {
  const defectByStage = {};
  STAGES.forEach(s => defectByStage[s] = {count: 0, items: 0});
  items.forEach(it => {
    if(defectByStage[it.stage]) {
      defectByStage[it.stage].count += it.defect;
      defectByStage[it.stage].items += it.qty;
    }
  });
  return defectByStage;
}

  const defectByStage = getDefectByStage();
  const tQ = items.reduce((s,i)=>s+i.qty,0);

  let html = '<div class="defect-modal-content">';

function render(){

  const q=document.getElementById('srch').value.toLowerCase();
  const data=items.filter(it=>{
    if(fS&&it.stage!==fS)return false;
    const dp=dpct(it.defect,it.qty);
    if(fD==='ok'&&dp>=3)return false;
    if(fD==='warn'&&(dp<3||dp>=5))return false;
    if(fD==='bad'&&dp<5)return false;
    const searchStr = (it.name + it.code + (it.note||'') + (it.fabric||'')).toLowerCase();
    if(q && !searchStr.includes(q)) return false;
    return true;

// ==================== GOOGLE SHEET INTEGRATION ====================
const SHEET_ID = '1lPp5LuwT6lAt0wozRduI8ErarHk-5iwI5PWoZwmTZoY';
const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
const CORS_PROXY = `https://api.allorigins.win/raw?url=`;

// ========== FIXED COLUMN INDEX MAP (0-based) ==========
// C=2  วันที่รับออเดอร์
// D=3  วันกำหนดส่ง
// E=4  เลขบิล / INV
// I=8  ชื่อทีม / ลหัดสินค้า
// J=9  จำนวน
// K=10 ประเภทคอเสื้อ
// L=11 ประเภทผ้า
const COL = { orderdate:2, due:3, code:4, name:8, qty:9, worktype:10, fabric:11 };

// Cache sheet data so we don't re-fetch when user searches
let _sheetRows = null;

function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === ',' && !inQ) { cols.push(cur); cur = ''; continue; }
      cur += ch;
    }
    cols.push(cur.replace(/\r/g,''));
    rows.push(cols);
  }
  return rows;
}

function parseSheetDate(str) {
  if (!str) return '';
  str = str.trim();
  let dt = new Date(str);
  if (!isNaN(dt) && str.includes('-')) return toISO(dt);
  // handle d/m/yy or d/m/yyyy
  const parts = str.split('/');
  if (parts.length === 3) {
    let [dd, mm, yy] = parts.map(p => p.trim());
    if (yy.length === 2) yy = '20' + yy;
    dt = new Date(`${yy}-${mm.padStart(2,'0')}-${dd.padStart(2,'0')}`);
    if (!isNaN(dt)) return toISO(dt);
  }
  return '';
}

function rowToData(row) {
  const g = (idx) => (row[idx] || '').trim();
  return {
    orderdate : g(COL.orderdate),
    due       : g(COL.due),
    code      : g(COL.code),
    name      : g(COL.name),
    qty       : g(COL.qty),
    worktype  : g(COL.worktype),
    fabric    : g(COL.fabric),
  };
}

// Multiple CORS proxies — try each until one works
const CORS_PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://cors-anywhere.herokuapp.com/${url}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
];

async function loadSheetRows() {
  if (_sheetRows) return _sheetRows;
  let lastErr = null;
  for (const proxyFn of CORS_PROXIES) {
    try {
      const proxyUrl = proxyFn(SHEET_CSV_URL);
      const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const csv = await res.text();
      if (!csv || csv.length < 10) continue;
      const rows = parseCSV(csv);
      if (!rows || rows.length < 2) continue;
      _sheetRows = rows.slice(1).filter(r => (r[COL.code]||'').trim());
      return _sheetRows;
    } catch(e) { lastErr = e; }
  }
  throw new Error('ເຊື່ອມຕໍ່ Sheet ບໍ່ໄດ້ — ກວດສອບວ່າ Sheet ແຊ "Anyone with the link" ແລ້ວລອງໃໝ່');
}

  try {
    const rows = await loadSheetRows();

      ? rows.filter(r => (r[COL.code]||'').toLowerCase().includes(q))
      : rows;

      wrap.innerHTML = `<div class="gs-picker"><div class="gs-err">ບໍ່ພົບ INV "<b>${q}</b>" ໃນ Sheet</div></div>`;

function renderPickerRows(rows, wrap) {
  let html = `<div class="gs-picker">
    <div class="gs-picker-hdr">
      <span>📋 ຜົນລັບ ${rows.length} ລາຍການ — ຄລິກເພື່ອຕື່ມຂໍ້ມູນ</span>
      <span class="gs-tag">Col C D E I J K L</span>
    </div>`;

  rows.forEach(row => {
    const d = rowToData(row);
    if (!d.code) return;
    const dataAttr = encodeURIComponent(JSON.stringify(d));
    html += `<div class="gs-row" onclick="fillFromSheet('${dataAttr}')">
      <div>
        <div style="font-weight:700;font-size:13px;color:var(--text)">${d.name || '—'}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">
          ${d.orderdate ? '📅 ' + d.orderdate : ''}${d.due ? ' → ສົ່ງ ' + d.due : ''}
        </div>
      </div>
      <div style="text-align:center">
        <div class="gs-row-code">${d.code}</div>
        ${d.worktype ? `<div style="font-size:10px;color:#FFB74D;margin-top:2px">${d.worktype}</div>` : ''}
      </div>
      <div style="text-align:right">
        ${d.qty ? `<div class="gs-row-qty">${d.qty} ຊິ້ນ</div>` : ''}
        ${d.fabric ? `<div style="font-size:10px;color:#42A5F5;margin-top:2px">${d.fabric}</div>` : ''}
      </div>
    </div>`;
  });

  html += `</div>`;
  wrap.innerHTML = html;
}

// Legacy button "ດຶງທັງໝົດ" still works
async function fetchFromSheet() {
  const btn = document.getElementById('gsBtn');
  const wrap = document.getElementById('gs-picker-wrap');
  if (!btn || !wrap) return;

    btn.textContent = '🔄 ດຶງໃໝ່';

function fillFromSheet(dataAttr) {
  try {
    const d = JSON.parse(decodeURIComponent(dataAttr));
    const setVal = (id, val) => { const el = document.getElementById(id); if(el && val !== undefined) el.value = val; };

    setVal('fc',       d.code);
    setVal('fn',       d.name);
    setVal('fq',       d.qty ? (parseInt(d.qty) || '') : '');
    setVal('ffabric',  d.fabric);
    setVal('fworktype', d.worktype);

    const ordParsed = parseSheetDate(d.orderdate);
    const dueParsed = parseSheetDate(d.due);
    if (ordParsed) { setVal('forderdate', ordParsed); setVal('fst', ordParsed); }
    if (dueParsed) setVal('fdu', dueParsed);

    document.getElementById('gs-picker-wrap').innerHTML =
      `<div class="gs-filled-ok">✅ ດຶງຂໍ້ມູນ <b>${d.code}</b> ສຳເລັດ — ກວດສອບ ແລະ ແກ້ໄຂໄດ້ດ້ານລຸ່ມ</div>`;
    toast('✅ ຕື່ມຂໍ້ມູນຈາກ Google Sheet ສຳເລັດ');
  } catch(e) {
    toast('❌ ຕື່ມຂໍ້ມູນບໍ່ໄດ້: ' + e.message);
  }
}

let playerRows = []; // [{name, number, size, qty, note}]
const SIZE_OPTS_LIST = ['XS','S','M','L','XL','2XL','3XL','4XL'];

function addPlayerRow(data={}) {
  playerRows.push({ name: data.name||'', number: data.number||'', size: data.size||'', qty: data.qty||'1', note: data.note||'' });
  renderPlayerRows();
  updatePreview();

function removePlayerRow(i) {
  playerRows.splice(i, 1);
  renderPlayerRows();
  updatePreview();
}

function playerRowChanged(i, field, val) {
  if (playerRows[i]) { playerRows[i][field] = val; updatePreview(); }
}

function renderPlayerRows() {
  const wrap = document.getElementById('player-rows');
  if (!wrap) return;
  if (playerRows.length === 0) { wrap.innerHTML = ''; return; }
  const sizeOptions = SIZE_OPTS_LIST.map(s => `<option value="${s}">${s}</option>`).join('');
  wrap.innerHTML = playerRows.map((p, i) => `
    <div class="player-row">
      <span class="p-num">${i+1}</span>
      <input value="${p.name}" placeholder="ຊື່..." oninput="playerRowChanged(${i},'name',this.value)" style="border-right:1px solid var(--border)">
      <input value="${p.number}" placeholder="00" oninput="playerRowChanged(${i},'number',this.value)" style="text-align:center;font-weight:700;color:var(--red-lite);border-right:1px solid var(--border)">
      <select onchange="playerRowChanged(${i},'size',this.value)" style="border-right:1px solid var(--border)">
        <option value="">-ໄຊ-</option>${sizeOptions}
      </select>
      <input value="${p.qty||1}" type="number" min="1" max="99" oninput="playerRowChanged(${i},'qty',this.value)" style="text-align:center;border-right:1px solid var(--border)">
      <input value="${p.note}" placeholder="ໝາຍເຫດ..." oninput="playerRowChanged(${i},'note',this.value)" style="border-right:1px solid var(--border)">
      <button class="rm-player" onclick="removePlayerRow(${i})">🗑</button>
    </div>`).join('');
  // restore size selects
  playerRows.forEach((p, i) => {
    const sel = wrap.querySelectorAll('select')[i];
    if (sel && p.size) sel.value = p.size;
  });
}

function initPlayerRows(saved=[]) {
  playerRows = saved.length > 0 ? [...saved] : [];
  // always start with at least 5 blank rows for new items
  if (saved.length === 0) {
    for (let i = 0; i < 5; i++) addPlayerRow();
    return;
  }
  renderPlayerRows();
  updatePreview();
}

function bindPreviewListeners() {
  const ids = ['fc','fn','fq','fworktype','ffabric','forderdate','fdu','fst','fd','fno','fdept','forderstatus','fs'];
  ids.forEach(id => {

// ==================== QR SCANNER ====================
let _scanStream = null;
let _scanTimer  = null;
let _scanTarget = null; // item found by scan
let _scanSelectedStage = null;

// Load jsQR library dynamically
function loadJsQR() {
  return new Promise((resolve, reject) => {
    if (window.jsQR) { resolve(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function openScanner() {
  document.getElementById('scan-ov').classList.remove('hidden');
  document.getElementById('scan-hint').textContent = 'ກຳລັງເປີດກ້ອງ...';
  document.getElementById('scan-hint').className = 'scan-hint';
  document.getElementById('scan-manual-input').value = '';

  try {
    await loadJsQR();
    // Request camera — prefer rear camera on mobile
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    _scanStream = stream;
    const video = document.getElementById('scan-video');
    video.srcObject = stream;
    video.play();
    video.onloadedmetadata = () => {
      document.getElementById('scan-hint').textContent = 'ຈ່ອ QR Code ໃຫ້ຢູ່ໃນກອບ';
      startScanLoop();
    };
  } catch(err) {
    let msg = 'ເປີດກ້ອງບໍ່ໄດ້';
    if (err.name === 'NotAllowedError') msg = '⚠️ ກະລຸນາອະນຸຍາດໃຊ້ກ້ອງ';
    else if (err.name === 'NotFoundError') msg = '⚠️ ບໍ່ພົບກ້ອງ — ໃຊ້ຊ່ອງພິມເລກ';
    document.getElementById('scan-hint').textContent = msg;
    document.getElementById('scan-hint').className = 'scan-hint error';
  }
}

function startScanLoop() {
  const video  = document.getElementById('scan-video');
  const canvas = document.getElementById('scan-canvas');
  const ctx    = canvas.getContext('2d');

  function tick() {
    if (!_scanStream) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = window.jsQR && jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: 'dontInvert'
      });
      if (code && code.data) {
        handleScanResult(code.data.trim());
        return; // stop loop after found
      }
    }
    _scanTimer = requestAnimationFrame(tick);
  }
  _scanTimer = requestAnimationFrame(tick);
}

function handleScanResult(qrData) {
  // QR data = INV code (e.g. "INV02822") or full string
  const code = qrData.toUpperCase().trim();
  setHint('🔍 ພົບ: ' + code + ' — ກຳລັງຊອກຫາ...', '');

  // Search in items array (match code or name)
  const found = items.find(it =>
    (it.code || '').toUpperCase() === code ||
    (it.code || '').toUpperCase().includes(code) ||
    code.includes((it.code || '').toUpperCase())
  );

  if (found) {
    setHint('✅ ພົບ Order: ' + found.code, 'found');
    setTimeout(() => {
      closeScanner();
      openScanResult(found);
    }, 600);
  } else {
    setHint('❌ ບໍ່ພົບ Order "' + code + '"', 'error');
    // Resume scanning after 2s
    setTimeout(() => {
      setHint('ຈ່ອ QR Code ໃຫ້ຢູ່ໃນກອບ', '');
      startScanLoop();
    }, 2000);
  }
}

function setHint(msg, cls) {
  const h = document.getElementById('scan-hint');
  if (!h) return;
  h.textContent = msg;
  h.className = 'scan-hint' + (cls ? ' ' + cls : '');
}

function closeScanner() {
  document.getElementById('scan-ov').classList.add('hidden');
  if (_scanTimer) { cancelAnimationFrame(_scanTimer); _scanTimer = null; }
  if (_scanStream) { _scanStream.getTracks().forEach(t => t.stop()); _scanStream = null; }
  const video = document.getElementById('scan-video');
  if (video) video.srcObject = null;
}

function manualScanSubmit() {
  const val = document.getElementById('scan-manual-input').value.trim();
  if (!val) return;
  handleScanResult(val);
}

    div.innerHTML = `
      <div class="scan-stage-dot" style="background:${color}"></div>

async function saveScanStatus() {
  if (!_scanTarget || !_scanSelectedStage) return;
  if (_scanSelectedStage === _scanTarget.stage) {
    toast('⚠️ ສະຖານະຍັງເໝືອນເດີມ — ເລືອກສະຖານະໃໝ່');
    return;
  }
  const staffName = (document.getElementById('scan-staff-name')?.value || '').trim();
  const btn = document.getElementById('scan-save-btn');
  btn.disabled = true;
  btn.textContent = '⏳ ກຳລັງບັນທຶກ...';
  try {
    const nowStr = new Date().toLocaleString('lo-LA',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const logEntry = { stage: _scanSelectedStage, staff: staffName || 'ບໍ່ລະບຸ', time: nowStr, ts: Date.now() };
    const existingLog = Array.isArray(_scanTarget.staffLog) ? _scanTarget.staffLog : [];

    await db.collection(COLLECTION).doc(String(_scanTarget.id)).update({
      stage: _scanSelectedStage,
      orderstatus: _scanSelectedStage,
      staffLog: [...existingLog, logEntry],
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    // Sync to Google Sheet column F
    syncSheetStatus(_scanTarget.code, _scanSelectedStage);
    toast(`✅ ອັບເດດ ${_scanTarget.code} → "${_scanSelectedStage}"${staffName?' ໂດຍ: '+staffName:''}`);
    closeScanResult();
  } catch(e) {
    toast('❌ ບັນທຶກບໍ່ໄດ້: ' + e.message);
  }
  btn.disabled = false;
  btn.textContent = '💾 ອັບເດດສະຖານະ';
}

async function loadStaffList() {
  const panel = document.getElementById('ac-mgr-panel');
  if (!panel) return;
  try {
    const snap = await db.collection(STAFF_COLLECTION).orderBy('createdAt','desc').get();
    if (snap.empty) {
      panel.innerHTML = `<div style="text-align:center;padding:20px;color:var(--text3)">ຍັງບໍ່ມີພະນັກງານ — ເພີ່ມຄົນທຳອິດ</div>`;
      return;
    }
    const roleLabel = { staff:'ທົ່ວໄປ', editor:'ບັນນາທິການ', admin:'ຜູ້ດູແລ' };
    const roleColor = { staff:'var(--text2)', editor:'#42A5F5', admin:'#FFB74D' };
    panel.innerHTML = snap.docs.map(doc => {
      const d = doc.data();
      const active = d.active !== false;
      const role = d.role || 'staff';
      return `<div class="staff-row">
        <div style="font-size:22px">${active ? '🟢' : '🔴'}</div>
        <div class="staff-info">
          <div class="staff-name">${d.name || '—'}</div>
          <div class="staff-meta">
            <span style="color:${roleColor[role]};font-weight:700">${roleLabel[role]||role}</span>
            · ${d.grantedBy ? 'ຮັບສິດໂດຍ: '+d.grantedBy : ''}
            · ${d.createdAt ? new Date(d.createdAt.toDate()).toLocaleDateString('lo-LA') : ''}
          </div>
        </div>
        <div class="staff-actions">
          <button class="btn" onclick="toggleStaffAccess('${doc.id}',${active})" style="height:32px;font-size:12px;padding:0 10px">${active ? '⛔ ປິດ' : '✅ ເປີດ'}</button>
          <button class="btn ab-del" onclick="deleteStaff('${doc.id}','${d.name}')" style="height:32px;font-size:12px;padding:0 10px;color:var(--red-lite);border-color:rgba(229,57,53,.3)">🗑️</button>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    panel.innerHTML = `<div class="ac-err">❌ ${e.message}</div>`;
  }
}

async function addNewStaff() {
  const name = (document.getElementById('new-staff-name')?.value || '').trim();
  const pin  = (document.getElementById('new-staff-pin')?.value  || '').trim();
  const role = document.getElementById('new-staff-role')?.value || 'staff';
  const err  = document.getElementById('new-staff-err');

  if (!name) { if(err) err.textContent = '⚠️ ໃສ່ຊື່ພະນັກງານ'; return; }
  if (!pin || pin.length < 4) { if(err) err.textContent = '⚠️ PIN ຕ້ອງມີຢ່າງໜ້ອຍ 4 ຕົວ'; return; }
  if (!/^\d+$/.test(pin)) { if(err) err.textContent = '⚠️ PIN ຕ້ອງເປັນຕົວເລກເທົ່ານັ້ນ'; return; }
  if(err) err.textContent = '';

  try {
    await db.collection(STAFF_COLLECTION).add({
      name,
      pin: normalizePin(pin),
      role,
      active: true,
      grantedBy: _currentStaff?.name || 'Admin',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById('new-staff-name').value = '';
    document.getElementById('new-staff-pin').value = '';
    toast(`✅ ເພີ່ມ "${name}" ສຳເລັດ`);
    await loadStaffList();
  } catch(e) {
    if(err) err.textContent = '❌ ' + e.message;
  }
}

async function toggleStaffAccess(docId, currentlyActive) {
  try {
    await db.collection(STAFF_COLLECTION).doc(docId).update({ active: !currentlyActive });
    toast(currentlyActive ? '⛔ ປິດການເຂົ້າໃຊ້ງານແລ້ວ' : '✅ ເປີດການເຂົ້າໃຊ້ງານແລ້ວ');

async function deleteStaff(docId, name) {

async function doStaffLogin() {
  const name = (document.getElementById('sl-name')?.value || '').trim();
  const pin  = (document.getElementById('sl-pin')?.value  || '').trim();
  const err  = document.getElementById('sl-err');
  if (!name || !pin) { if(err) err.textContent = '⚠️ ໃສ່ຊື່ ແລະ PIN'; return; }
  const pinNorm = normalizePin(pin);
  try {
    const snap = await db.collection(STAFF_COLLECTION).get();
    const match = snap.docs.find(d => {
      const data = d.data();
      return normalizePin(data.pin||data.pinHash||'') === pinNorm
        && data.name.trim().toLowerCase() === name.trim().toLowerCase()
        && data.active !== false;
    });
    if (!match) {
      if(err) err.textContent = '❌ ຊື່ ຫຼື PIN ບໍ່ຖືກ / ບັນຊີຖືກປິດ';
      return;
    }
    _currentStaff = { id: match.id, ...match.data() };
    document.getElementById('staff-login-ov')?.remove();
    toast(`✅ ຍິນດີຕ້ອນຮັບ ${_currentStaff.name}`);
    if (window._staffLoginCallback) window._staffLoginCallback(_currentStaff);
  } catch(e) {
    if(err) err.textContent = '❌ ' + e.message;
  }
}

// Session key so login persists on refresh (same browser tab session)
const SESSION_KEY = 'sl_staff_session';

function saveSession(staff) {
  try { sessionStorage.setItem(SESSION_KEY, JSON.stringify({ name: staff.name, role: staff.role, id: staff.id })); } catch(e){}
}
function loadSession() {
  try { const s = sessionStorage.getItem(SESSION_KEY); return s ? JSON.parse(s) : null; } catch(e){ return null; }
}
function clearSession() {
  try { sessionStorage.removeItem(SESSION_KEY); } catch(e){}
}

function unlockApp(staffInfo) {
  _currentStaff = staffInfo;
  document.getElementById('login-gate').style.display = 'none';
  document.getElementById('app-content').style.display = 'block';

  // Show who is logged in + logout button in header
  const hdrRight = document.querySelector('.hdr > div:last-child') || document.querySelector('.hdr');
  if (hdrRight) {

      </span>
      <button class="btn-hdr-act" onclick="logoutStaff()" style="color:#FF8A80;border-color:rgba(229,57,53,.3);background:rgba(229,57,53,.06)">🚪 ອອກ</button>`;
    hdrRight.insertBefore(tag, hdrRight.firstChild);
  }

  if (staffInfo.role !== 'admin') {
    const mgrBtn = document.querySelector('[onclick="openAccessManager()"]');

function logoutStaff() {
  if (!confirm('ຢືນຢັນການອອກຈາກລະບົບ?')) return;
  if (_presenceTimer) clearInterval(_presenceTimer);
  if (_currentStaff && _currentStaff.id !== 'admin') {
    db.collection(PRESENCE_COL).doc(_currentStaff.id).update({ online: false }).catch(function(){});
  }
  clearSession();
  location.reload();
}

async function doGateLogin() {
  // Hard fallback — if anything fails we use alert so user always sees feedback
  var showErr = function(msg) {
    var el = document.getElementById('gate-err');
    if (el) {
      el.textContent = msg;
      el.style.cssText = 'display:block;color:#FF8A80;font-size:13px;font-weight:700;background:rgba(229,57,53,0.12);border:1px solid rgba(229,57,53,0.35);border-radius:6px;padding:8px 12px;margin-bottom:8px;text-align:center';
    } else {
      alert(msg);
    }
  };

  var setBtn = function(loading) {
    var btn = document.getElementById('gate-submit-btn');
    if (!btn) return;
    btn.disabled = loading;
    btn.textContent = loading ? '⏳ ກຳລັງກວດສອບ...' : '🔓 ເຂົ້າໃຊ້ງານ';
  };

  try {
    var name = (document.getElementById('gate-name').value || '').trim();
    var pin  = (document.getElementById('gate-pin').value  || '').trim();

    if (!name || !pin) { showErr('⚠️ ໃສ່ຊື່ ແລະ PIN ກ່ອນ'); return; }

    setBtn(true);

    var snap = await db.collection(STAFF_COLLECTION).get();

    if (snap.empty) {
      setBtn(false);
      showErr('⚠️ ຍັງບໍ່ມີຂໍ້ມູນພະນັກງານ — ໃຊ້ ຜູ້ດູແລລະບົບ ດ້ານລຸ່ມ');
      return;
    }

    var pinNorm = normalizePin(pin);
    var nameLow = name.toLowerCase();
    var match   = null;

    snap.forEach(function(doc) {
      if (match) return;
      var d = doc.data();
      var dname = (d.name || '').trim().toLowerCase();
      var dpin  = normalizePin(d.pin || d.pinHash || '');
      if (dname === nameLow && dpin === pinNorm && d.active !== false) {
        match = { id: doc.id, name: d.name, role: d.role || 'staff', active: true };
      }
    });

    setBtn(false);

    if (!match) {
      document.getElementById('gate-pin').value = '';
      showErr('❌ ຊື່ ຫຼື PIN ບໍ່ຖືກ');
      return;
    }

    saveSession(match);
    unlockApp(match);

  } catch(err) {
    setBtn(false);
    var msg = err && err.message ? err.message : String(err);
    if (msg.indexOf('permission') !== -1 || msg.indexOf('Missing') !== -1) {
      showErr('❌ Firestore Rules ຍັງບໍ່ຖືກ — ໃຫ້ Admin ຕັ້ງ Rules ກ່ອນ');
    } else {
      showErr('❌ ' + msg);
    }
    console.error('doGateLogin error:', err);
  }
}

function doAdminBypass() {
  // Show inline admin PIN dialog (prompt() blocked in some browsers)
  const existing = document.getElementById('admin-bypass-box');
  if (existing) { existing.remove(); return; }

  const box = document.createElement('div');
  box.id = 'admin-bypass-box';
  box.style.cssText = 'margin-top:14px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:14px;width:100%';
  box.innerHTML = `
    <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">🔧 Admin PIN</div>
    <div style="display:flex;gap:8px">
      <input id="admin-pin-inp" type="password" maxlength="12" placeholder="ໃສ່ Admin PIN..."
        style="flex:1;height:40px;padding:0 12px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:15px;letter-spacing:4px;outline:none"
        onkeydown="if(event.key==='Enter')confirmAdminBypass()">
      <button class="btn bp" onclick="confirmAdminBypass()" style="height:40px;padding:0 14px;flex-shrink:0">ເຂົ້າ</button>
    </div>
    <div id="admin-bypass-err" style="color:#FF8A80;font-size:12px;margin-top:6px;min-height:16px"></div>`;

  const card = document.querySelector('.login-card');
  if (card) card.appendChild(box);
  setTimeout(() => document.getElementById('admin-pin-inp')?.focus(), 50);
}

function confirmAdminBypass() {
  try {
    var pin = (document.getElementById('admin-pin-inp').value || '').trim();
    var err = document.getElementById('admin-bypass-err');
    if (!pin) { if(err) err.textContent = '⚠️ ໃສ່ PIN'; return; }
    if (normalizePin(pin) !== normalizePin(ADMIN_PIN)) {
      if(err) err.textContent = '❌ PIN ບໍ່ຖືກ';
      document.getElementById('admin-pin-inp').value = '';
      return;
    }
    var adminInfo = { id: 'admin', name: 'Admin', role: 'admin', active: true };
    saveSession(adminInfo);
    unlockApp(adminInfo);
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

// ---- Boot: check session first, else show gate ----
(function boot() {
  // Firebase must be ready — check session after a tick
  const session = loadSession();
  if (session) {
    // Validate session still active (non-blocking — optimistic unlock)
    unlockApp(session);
    // Background check: still active in Firestore
    if (session.id && session.id !== 'admin') {
      db.collection(STAFF_COLLECTION).doc(session.id).get().then(doc => {
        if (!doc.exists || doc.data().active === false) {
          toast('⛔ ບັນຊີຂອງທ່ານຖືກປິດ — ກະລຸນາຕິດຕໍ່ Admin');
          setTimeout(() => { clearSession(); location.reload(); }, 2500);
        }
      }).catch(()=>{});
    }
  }
  // else: login gate stays visible (default)
})();
// ==================== END LOGIN GATE BOOT ====================

// ==================== CHAT & ONLINE PRESENCE ====================
const PRESENCE_COL = 'presence';
const CHAT_COL     = 'chat_messages';
var _chatOpen        = false;
var _activeTab       = 'chat';
var _unreadCount     = 0;
var _chatListener    = null;
var _onlineListener  = null;
var _presenceTimer   = null;

function startPresence(staff) {
  if (!staff || staff.id === 'admin') return;
  var updatePresence = function() {
    db.collection(PRESENCE_COL).doc(staff.id).set({
      name: staff.name, role: staff.role || 'staff',
      lastSeen: firebase.firestore.FieldValue.serverTimestamp(), online: true
    }, { merge: true }).catch(function(){});
  };
  updatePresence();
  _presenceTimer = setInterval(updatePresence, 30000);
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) db.collection(PRESENCE_COL).doc(staff.id).update({ online: false }).catch(function(){});
    else updatePresence();
  });
  window.addEventListener('beforeunload', function() {
    db.collection(PRESENCE_COL).doc(staff.id).update({ online: false }).catch(function(){});
  });
}

function startOnlineListener() {
  if (_onlineListener) _onlineListener();
  _onlineListener = db.collection(PRESENCE_COL).onSnapshot(function(snap) {
    var now = Date.now();
    var rows = [];
    var onlineCount = 0;
    snap.forEach(function(doc) {
      var d = doc.data();
      var lastMs = d.lastSeen && d.lastSeen.toDate ? d.lastSeen.toDate().getTime() : 0;
      var isOn = d.online === true && (now - lastMs) < 120000;
      if (isOn) onlineCount++;
      rows.push({ name: d.name, role: d.role, isOn: isOn, lastMs: lastMs });
    });
    rows.sort(function(a,b){ return (b.isOn?1:0)-(a.isOn?1:0) || b.lastMs-a.lastMs; });
    var tabEl = document.getElementById('online-count-tab');
    if (tabEl) tabEl.textContent = onlineCount > 0 ? '(' + onlineCount + ')' : '';
    var listEl = document.getElementById('online-list');
    if (!listEl) return;
    if (rows.length === 0) { listEl.innerHTML = '<div class="chat-empty">ຍັງບໍ່ມີໃຜ Login</div>'; return; }
    var roleLabel = { staff:'ທົ່ວໄປ', editor:'ບັນນາທິການ', admin:'ຜູ້ດູແລ' };
    listEl.innerHTML = rows.map(function(r) {
      var ago = '';
      if (r.lastMs) {
        var diff = Math.floor((Date.now()-r.lastMs)/1000);
        if (diff<60) ago=diff+'s ກ່ອນ'; else if(diff<3600) ago=Math.floor(diff/60)+'m ກ່ອນ'; else ago=Math.floor(diff/3600)+'h ກ່ອນ';
      }
      return '<div class="online-row">'+
        '<div class="online-dot '+(r.isOn?'on':'off')+'"></div>'+
        '<div class="online-name">'+(r.name||'?')+'</div>'+
        '<div class="online-meta">'+(roleLabel[r.role]||'')+(ago?' · '+ago:'')+'</div>'+
        '</div>';
    }).join('');
  }, function(e){ console.warn('presence:', e); });
}

function startChatListener() {
  if (_chatListener) _chatListener();
  _chatListener = db.collection(CHAT_COL).orderBy('createdAt','asc').limitToLast(100)
    .onSnapshot(function(snap) {
      var msgsEl = document.getElementById('chat-msgs');
      if (!msgsEl) return;
      snap.docChanges().forEach(function(change) {
        if (change.type==='added') {
          var d = change.doc.data();
          var isMe = _currentStaff && d.senderId===_currentStaff.id;
          if (!isMe && (!_chatOpen || _activeTab!=='chat')) _unreadCount++;
        }
      });
      updateChatBadge();
      var msgs = [];
      snap.forEach(function(doc){ msgs.push({ id:doc.id, ...doc.data() }); });
      if (msgs.length===0) { msgsEl.innerHTML='<div class="chat-empty">ຍັງບໍ່ມີຂໍ້ຄວາມ — ເລີ່ມລົມກັນໄດ້ເລີຍ 👋</div>'; return; }
      msgsEl.innerHTML = msgs.map(function(m) {
        var isMe = _currentStaff && m.senderId===_currentStaff.id;
        var time = m.createdAt&&m.createdAt.toDate ? m.createdAt.toDate().toLocaleTimeString('lo-LA',{hour:'2-digit',minute:'2-digit'}) : '';
        return '<div class="chat-msg '+(isMe?'me':'them')+'">' +
          '<div>'+(!isMe?'<div class="chat-sender">'+(m.senderName||'?')+'</div>':'')+
          '<div class="chat-bubble">'+escHtml(m.text||'')+'</div></div>'+
          '<div class="chat-time">'+time+'</div></div>';
      }).join('');
      msgsEl.scrollTop = msgsEl.scrollHeight;
    }, function(e){ console.warn('chat:', e); });
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function updateChatBadge() {
  var b = document.getElementById('chat-badge');
  if (!b) return;
  if (_unreadCount>0 && (!_chatOpen||_activeTab!=='chat')) {
    b.textContent = _unreadCount>9?'9+':_unreadCount; b.style.display='flex';
  } else { b.style.display='none'; }
}

async function sendChatMsg() {
  var input = document.getElementById('chat-input');
  if (!input) return;
  var text = (input.value||'').trim();
  if (!text || !_currentStaff) return;
  input.value = '';
  try {
    await db.collection(CHAT_COL).add({
      text: text, senderId: _currentStaff.id, senderName: _currentStaff.name,
      senderRole: _currentStaff.role||'staff',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(e) { toast('❌ ສົ່ງບໍ່ໄດ້: '+e.message); input.value=text; }
}

function toggleChatPanel() {
  _chatOpen = !_chatOpen;
  var panel = document.getElementById('chat-panel');
  if (panel) panel.classList.toggle('open', _chatOpen);
  if (_chatOpen && _activeTab==='chat') {
    _unreadCount=0; updateChatBadge();
    setTimeout(function(){ var m=document.getElementById('chat-msgs'); if(m) m.scrollTop=m.scrollHeight; },50);
  }
}

function switchChatTab(tab) {
  _activeTab = tab;
  ['chat','online'].forEach(function(t){
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('pane-'+t).classList.toggle('active', t===tab);
  });
  if (tab==='chat') {
    _unreadCount=0; updateChatBadge();
    setTimeout(function(){ var m=document.getElementById('chat-msgs'); if(m) m.scrollTop=m.scrollHeight; },50);
  }
}

function initChatFeature(staff) {
  var fab = document.getElementById('chat-fab');
  if (fab) fab.style.display='flex';
  startPresence(staff);
  startOnlineListener();
  startChatListener();
}
// ==================== END CHAT & ONLINE PRESENCE ====================
</script>
<!-- ===== CHAT & ONLINE PANEL ===== -->
<button id="chat-fab" onclick="toggleChatPanel()" title="ແຊດ & ອອນໄລນ໌">
  💬
  <span class="chat-badge" id="chat-badge"></span>
</button>

<div id="chat-panel">
  <!-- Tabs -->
  <div class="cp-tabs">
    <button class="cp-tab active" id="tab-chat"   onclick="switchChatTab('chat')">💬 ແຊດ</button>
    <button class="cp-tab"        id="tab-online" onclick="switchChatTab('online')">🟢 ອອນໄລນ໌ <span id="online-count-tab"></span></button>
  </div>

  <!-- Chat Pane -->
  <div class="cp-pane active" id="pane-chat">
    <div class="chat-msgs" id="chat-msgs">
      <div class="chat-empty">⏳ ກຳລັງໂຫລດ...</div>
    </div>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" placeholder="ພິມຂໍ້ຄວາມ..." maxlength="300"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMsg();}">
      <button class="chat-send-btn" onclick="sendChatMsg()">➤</button>
    </div>
  </div>

  <!-- Online Pane -->
  <div class="cp-pane" id="pane-online">
    <div class="online-list" id="online-list">
      <div class="chat-empty">⏳ ກຳລັງໂຫລດ...</div>
    </div>
  </div>
</div>
<!-- ===== END CHAT & ONLINE PANEL ===== -->

</body>
</html>
